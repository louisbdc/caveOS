name: CaveOS
options:
  bundleIdPrefix: com.louisbdc
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  developmentLanguage: fr
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  CaveOS:
    type: application
    platform: iOS
    sources:
      - CaveOS
      - Shared
    dependencies:
      - target: CaveOSWidget
    info:
      path: CaveOS/Info.plist
      properties:
        CFBundleDisplayName: CaveOS
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSCameraUsageDescription: "CaveOS utilise la caméra pour scanner les étiquettes et codes-barres de vos bouteilles et pré-remplir la fiche, hors-ligne."
        NSPhotoLibraryUsageDescription: "CaveOS peut analyser une photo d'étiquette importée depuis votre photothèque."
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.louisbdc.caveos
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: CaveOS/CaveOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES

  CaveOSWidget:
    type: app-extension
    platform: iOS
    sources:
      - CaveOSWidget
      - Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.louisbdc.caveos.widget
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: CaveOSWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: CaveOSWidget/CaveOSWidget.entitlements
        SKIP_INSTALL: NO

  CaveOSWatch:
    type: application
    platform: watchOS
    sources:
      - CaveOSWatch
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.louisbdc.caveos.watchkitapp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_WKApplication: YES
        INFOPLIST_KEY_CFBundleDisplayName: CaveOS
        TARGETED_DEVICE_FAMILY: "4"

  CaveOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CaveOSTests
    dependencies:
      - target: CaveOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.louisbdc.caveos.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  CaveOS:
    build:
      targets:
        CaveOS: all
        CaveOSWidget: all
        CaveOSTests: [test]
    run:
      # Permet de tester les achats StoreKit en simulateur sans App Store Connect.
      storeKitConfiguration: Configuration/Products.storekit
    test:
      targets:
        - CaveOSTests
  CaveOSWatch:
    build:
      targets:
        CaveOSWatch: all
