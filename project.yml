name: CaveOS
options:
  bundleIdPrefix: com.louisbdc
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: fr
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: minimal
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  CaveOS:
    type: application
    platform: iOS
    sources:
      - CaveOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.louisbdc.caveos
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: CaveOS
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "CaveOS utilise la caméra pour scanner les étiquettes de vos bouteilles et pré-remplir la fiche automatiquement, hors-ligne."
        INFOPLIST_KEY_NSPhotoLibraryUsageDescription: "CaveOS peut analyser une photo d'étiquette importée depuis votre photothèque."
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES

  CaveOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CaveOSTests
    dependencies:
      - target: CaveOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.louisbdc.caveos.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  CaveOS:
    build:
      targets:
        CaveOS: all
        CaveOSTests: [test]
    test:
      targets:
        - CaveOSTests
